global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: catalog
    static_configs:
      - targets: [catalog:3001]
    metrics_path: /metrics

  - job_name: cart
    static_configs:
      - targets: [cart:3002]
    metrics_path: /metrics

  - job_name: checkout
    static_configs:
      - targets: [checkout:3003]
    metrics_path: /metrics

  - job_name: auth
    static_configs:
      - targets: [auth:3004]
    metrics_path: /metrics

  - job_name: admin
    static_configs:
      - targets: [admin:3005]
    metrics_path: /metrics
