# Helm values for kube-prometheus-stack
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm upgrade --install kube-prometheus prometheus-community/kube-prometheus-stack \
#   -n monitoring --create-namespace -f monitoring/prometheus/values.yaml

nameOverride: ""
fullnameOverride: ""

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "50GB"
    replicas: 2
    podAntiAffinity: hard

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi

    additionalScrapeConfigs:
      - job_name: shopcloud-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shopcloud]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  replicas: 2
  adminPassword: REPLACE_WITH_SECRET

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
    auth.anonymous:
      enabled: false
    security:
      disable_initial_admin_creation: false
      cookie_secure: true
      cookie_samesite: strict

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

  additionalDataSources:
    - name: CloudWatch
      type: cloudwatch
      jsonData:
        authType: default
        defaultRegion: us-east-1

# ─── AlertManager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 2
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      slack_api_url: "REPLACE_WITH_SLACK_WEBHOOK"
      resolve_timeout: 5m

    route:
      group_by: [alertname, cluster, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-default
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          repeat_interval: 1h
        - match:
            alertname: DLQMessagesVisible
          receiver: slack-critical

    receivers:
      - name: slack-default
        slack_configs:
          - channel: "#shopcloud-alerts"
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

      - name: slack-critical
        slack_configs:
          - channel: "#shopcloud-critical"
            title: '[CRITICAL] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# ─── Node Exporter ────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── Kube State Metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
