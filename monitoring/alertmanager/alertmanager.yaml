# AlertmanagerConfig — routes Prometheus alerts to Slack.
# Applied into the monitoring namespace (where kube-prometheus-stack lives).
# The prometheus-operator picks this up automatically for alerts originating
# from the shopcloud namespace.
#
# Secret setup (create once per cluster):
#   kubectl create secret generic alertmanager-slack \
#     -n monitoring \
#     --from-literal=webhookURL=https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
#
# PagerDuty (optional — uncomment receiver below and create secret):
#   kubectl create secret generic alertmanager-pagerduty \
#     -n monitoring \
#     --from-literal=serviceKey=YOUR_PAGERDUTY_KEY

apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: shopcloud-alertmanager-config
  namespace: shopcloud
  labels:
    alertmanagerConfig: shopcloud
spec:
  route:
    groupBy: [alertname, severity, service]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: slack-warning
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: slack-critical
        repeatInterval: 1h
        continue: false
      - matchers:
          - name: severity
            value: warning
        receiver: slack-warning
        continue: false

  receivers:
    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-slack
            key: webhookURL
          channel: "#shopcloud-alerts-critical"
          sendResolved: true
          iconEmoji: ":red_circle:"
          title: |-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          text: |-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
            *Service:* {{ .Labels.service }}
            {{ end }}

    - name: slack-warning
      slackConfigs:
        - apiURL:
            name: alertmanager-slack
            key: webhookURL
          channel: "#shopcloud-alerts"
          sendResolved: true
          iconEmoji: ":warning:"
          title: |-
            [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
          text: |-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Severity:* {{ .Labels.severity }}
            {{ end }}

  inhibitRules:
    # Suppress warnings when a critical alert is already firing for the same service
    - sourceMatch:
        - name: severity
          value: critical
      targetMatch:
        - name: severity
          value: warning
      equal: [alertname, service]
