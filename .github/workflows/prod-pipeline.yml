name: Production Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. prod-abc1234). Leave blank to build from HEAD."
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  CLUSTER_NAME: shopcloud-prod
  ENVIRONMENT: prod

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [catalog, cart, checkout, auth, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: services/${{ matrix.service }}
      - run: npm test
        working-directory: services/${{ matrix.service }}
        env:
          NODE_ENV: test

  # ─── Build & Push ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.image_tag == ''
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin]
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - id: tag
        run: echo "tag=prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:prod-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:prod-latest
          cache-to: type=inline

      - name: Scan image (block on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          exit-code: "1"
          severity: CRITICAL

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production   # requires manual approval gate in GitHub
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Determine image tag
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Record pre-deploy state (for rollback)
        id: pre_deploy
        run: |
          kubectl get deployments -n shopcloud -o json > /tmp/pre-deploy-state.json
          echo "Pre-deploy state saved"

      - name: Update image tags
        working-directory: k8s/overlays/prod
        run: |
          for svc in catalog cart checkout auth admin; do
            sed -i "s/newTag: prod-latest/newTag: ${{ steps.resolve_tag.outputs.tag }}/g" kustomization.yaml
          done

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout with timeout
        id: rollout
        run: |
          for svc in catalog cart checkout auth admin; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/$svc -n shopcloud --timeout=600s || exit 1
          done

      - name: Run production smoke tests
        id: smoke
        run: |
          sleep 15
          PROD_URL="${{ secrets.PROD_API_URL }}"
          curl -sf --retry 3 --retry-delay 5 "${PROD_URL}/api/v1/products" > /dev/null
          echo "Production smoke tests passed"

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'failure' || failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "ROLLING BACK: restoring previous deployment state"
          for svc in catalog cart checkout auth admin; do
            kubectl rollout undo deployment/$svc -n shopcloud
          done
          for svc in catalog cart checkout auth admin; do
            kubectl rollout status deployment/$svc -n shopcloud --timeout=300s
          done
          echo "Rollback complete"

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "Production deployment succeeded: ${{ steps.resolve_tag.outputs.tag }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Production deployment FAILED and rolled back. Tag: ${{ steps.resolve_tag.outputs.tag }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─── Terraform Plan (on PR to main) ────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (Prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.TF_REDIS_TOKEN }}
          TF_VAR_origin_verify_secret: ${{ secrets.TF_ORIGIN_SECRET }}

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = require('child_process').execSync('terraform show -no-color tfplan', { cwd: 'terraform/environments/prod' }).toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```terraform\n' + plan.substring(0, 60000) + '\n```'
            });
