name: Dev Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  CLUSTER_NAME: shopcloud-dev
  ENVIRONMENT: dev

permissions:
  id-token: write   # OIDC
  contents: read
  security-events: write

jobs:
  # ─── Lint & Test ───────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout, auth, admin]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  # ─── Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─── Build & Push ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:dev-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:dev-latest
          cache-to: type=inline

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL

  # ─── Deploy to Dev ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Update image tags in kustomization
        working-directory: k8s/overlays/dev
        run: |
          for svc in catalog cart checkout auth admin; do
            sed -i "s/newTag: dev-latest/newTag: dev-${{ github.sha }}/g" kustomization.yaml
          done

      - name: Deploy to dev cluster
        run: |
          kubectl apply -k k8s/overlays/dev
          kubectl rollout status deployment/catalog -n shopcloud --timeout=300s
          kubectl rollout status deployment/cart -n shopcloud --timeout=300s
          kubectl rollout status deployment/checkout -n shopcloud --timeout=300s
          kubectl rollout status deployment/auth -n shopcloud --timeout=300s
          kubectl rollout status deployment/admin -n shopcloud --timeout=300s

      - name: Run smoke tests
        run: |
          DEV_URL="${{ secrets.DEV_API_URL }}"
          curl -sf "${DEV_URL}/api/v1/products" | jq '.data | length > 0'
          echo "Smoke tests passed"

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Dev deployment failed for commit ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
