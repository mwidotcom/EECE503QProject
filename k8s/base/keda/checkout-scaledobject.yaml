apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: checkout-sqs-scaler
  namespace: shopcloud
spec:
  scaleTargetRef:
    name: checkout
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 120
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-aws-credentials
      metadata:
        queueURL: REPLACE_SQS_QUEUE_URL
        queueLength: "5"
        awsRegion: us-east-1
        identityOwner: operator
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-aws-credentials
  namespace: shopcloud
spec:
  podIdentity:
    provider: aws-eks
