# Cluster Autoscaler — scales EKS node groups up/down based on pending pods.
#
# Pre-requisites:
#   - EKS node groups must have these tags (add to terraform/modules/eks/main.tf node group):
#       k8s.io/cluster-autoscaler/<CLUSTER_NAME> = "owned"
#       k8s.io/cluster-autoscaler/enabled        = "true"
#   - IRSA role ARN comes from: terraform output irsa_cluster_autoscaler_role_arn
#     Replace REPLACE_IRSA_ROLE_ARN below before applying.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
  annotations:
    eks.amazonaws.com/role-arn: "REPLACE_IRSA_ROLE_ARN"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
  labels:
    app: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: [events, endpoints]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  - apiGroups: [""]
    resources: [pods/status]
    verbs: [update]
  - apiGroups: [""]
    resources: [endpoints]
    resourceNames: [cluster-autoscaler]
    verbs: [get, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [watch, list, get, update]
  - apiGroups: [""]
    resources: [namespaces, pods, services, replicationcontrollers, persistentvolumeclaims, persistentvolumes]
    verbs: [watch, list, get]
  - apiGroups: [extensions]
    resources: [replicasets, daemonsets]
    verbs: [watch, list, get]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [watch, list]
  - apiGroups: [apps]
    resources: [statefulsets, replicasets, daemonsets]
    verbs: [watch, list, get]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses, csinodes, csidrivers, csistoragecapacities]
    verbs: [watch, list, get]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [watch, list]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    resourceNames: [cluster-autoscaler]
    verbs: [get, update]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
  labels:
    app: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      serviceAccountName: cluster-autoscaler
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      priorityClassName: system-cluster-critical
      containers:
        - name: cluster-autoscaler
          image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.29.0
          command:
            - ./cluster-autoscaler
            - --v=4
            - --stderrthreshold=info
            - --cloud-provider=aws
            - --skip-nodes-with-local-storage=false
            - --expander=least-waste
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/REPLACE_CLUSTER_NAME
            - --balance-similar-node-groups
            - --skip-nodes-with-system-pods=false
            - --scale-down-delay-after-add=5m
            - --scale-down-unneeded-time=10m
          env:
            - name: AWS_REGION
              value: us-east-1    # overridden per environment
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 100m
              memory: 300Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ssl-certs
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
      volumes:
        - name: ssl-certs
          hostPath:
            path: /etc/ssl/certs/ca-bundle.crt
