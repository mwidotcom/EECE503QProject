# Helm values for the AWS Load Balancer Controller.
# The controller watches Ingress resources and provisions ALBs/NLBs in AWS.
# Without it, the ALB ingress annotations in k8s/base/ingress/ have no effect.
#
# Install commands (run after terraform apply, replace placeholders):
#
#   helm repo add eks https://aws.github.io/eks-charts
#   helm repo update
#
#   # Production (US)
#   helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     -f k8s/cluster-components/aws-lb-controller-values.yaml \
#     --set clusterName=shopcloud-prod \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$(terraform -chdir=terraform/environments/prod output -raw irsa_alb_controller_role_arn)
#
#   # EU
#   helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     -f k8s/cluster-components/aws-lb-controller-values.yaml \
#     --set clusterName=shopcloud-prod-eu \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$(terraform -chdir=terraform/environments/prod-eu output -raw irsa_alb_controller_role_arn)
#
#   # Dev
#   helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     -f k8s/cluster-components/aws-lb-controller-values.yaml \
#     --set clusterName=shopcloud-dev \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$(terraform -chdir=terraform/environments/dev output -raw irsa_alb_controller_role_arn)

replicaCount: 2

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations: {}   # set via --set at install time (see above)

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

podDisruptionBudget:
  maxUnavailable: 1

# Keep controller pods on separate nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller
          topologyKey: kubernetes.io/hostname

# Restrict to nodes in the private subnets
nodeSelector:
  kubernetes.io/os: linux

tolerations: []

# Enable Shield Advanced integration (prod only — dev can leave false)
enableShield: false
enableWaf: true
enableWafv2: true

# Log level: info in prod, debug in dev
logLevel: info
