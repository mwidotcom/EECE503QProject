# ClusterSecretStore — connects External Secrets Operator to AWS Secrets Manager.
# Applied once per cluster (cluster-scoped resource, not namespaced).
#
# Pre-requisites:
#   1. ESO installed: helm upgrade --install external-secrets external-secrets/external-secrets \
#        -n external-secrets --create-namespace \
#        --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<ESO_IRSA_ROLE_ARN>
#   2. The IRSA role ARN comes from terraform output: irsa_eso_role_arn

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1       # overridden per environment via kustomize patch
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
